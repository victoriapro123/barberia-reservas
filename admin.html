<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Barber Elite Admin</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --panel: #141414;
      --panel-2: #1b1b1b;
      --panel-3: #101010;
      --border: #2d2d2d;
      --text: #f6f6f6;
      --muted: #bdbdbd;
      --accent: #c7a86b;
      --danger: #d97777;
      --success: #7fd28c;
      --info: #a9cbff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(199, 168, 107, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      padding: 24px;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .brand p,
    .helper,
    .empty,
    .meta {
      color: var(--muted);
      line-height: 1.5;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }

    .login-card {
      max-width: 460px;
      margin: 64px auto 0;
    }

    .login-card h2,
    .section-title {
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #343434;
      background: var(--panel-3);
      color: var(--text);
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .btn-primary {
      background: var(--accent);
      color: black;
      font-weight: bold;
    }

    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: rgba(217, 119, 119, 0.14);
      color: #ffb5b5;
      border: 1px solid rgba(217, 119, 119, 0.28);
    }

    .btn-info {
      background: rgba(120, 171, 233, 0.14);
      color: var(--info);
      border: 1px solid rgba(120, 171, 233, 0.28);
    }

    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .week-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .week-title {
      min-width: 240px;
      text-align: center;
      font-weight: bold;
      color: var(--text);
    }

    .search-row {
      margin-bottom: 18px;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .day-column {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .day-header {
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .day-header h3 {
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .day-count {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .day-content {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .empty-day {
      background: var(--panel-3);
      border: 1px dashed #303030;
      border-radius: 14px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
    }

    .reservation-card {
      background: var(--panel-3);
      border: 1px solid #252525;
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .reservation-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .reservation-hour {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .reservation-name {
      font-size: 1rem;
      font-weight: bold;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: bold;
      white-space: nowrap;
    }

    .badge.activa {
      background: rgba(199, 168, 107, 0.14);
      color: #f0d39a;
      border: 1px solid rgba(199, 168, 107, 0.28);
    }

    .badge.cancelada {
      background: rgba(217, 119, 119, 0.14);
      color: #ffb5b5;
      border: 1px solid rgba(217, 119, 119, 0.28);
    }

    .badge.completada {
      background: rgba(120, 171, 233, 0.14);
      color: var(--info);
      border: 1px solid rgba(120, 171, 233, 0.28);
    }

    .reservation-lines {
      display: grid;
      gap: 8px;
    }

    .reservation-line {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .reservation-line strong {
      color: var(--text);
    }

    .notes-panel {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .notes-panel strong {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .notes-actions,
    .reservation-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 14px;
    }

    .status.error {
      color: #ffb5b5;
    }

    .status.success {
      color: var(--success);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1180px) {
      .week-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .brand h1 {
        font-size: 1.6rem;
      }

      .week-grid {
        grid-template-columns: 1fr;
      }

      .toolbar-actions button,
      .week-nav button,
      .notes-actions button,
      .reservation-actions button {
        width: 100%;
      }

      .week-title {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="loginSection" class="card login-card">
      <h2>Acceso admin</h2>
      <p class="helper">Inicia sesion con tu cuenta de Firebase para revisar y gestionar solicitudes.</p>
      <div class="form-grid">
        <input type="email" id="emailInput" placeholder="Correo admin" autocomplete="email" />
        <input type="password" id="passwordInput" placeholder="Contrasena" autocomplete="current-password" />
        <button id="loginButton" class="btn-primary">Entrar</button>
      </div>
      <div id="loginStatus" class="status"></div>
    </section>

    <section id="adminSection" class="hidden">
      <div class="topbar">
        <div class="brand">
          <h1>Panel semanal</h1>
          <p>Gestion privada de reservas de Barber Elite.</p>
        </div>
        <div class="toolbar-actions">
          <span id="adminEmail" class="helper"></span>
          <button id="refreshButton" class="btn-secondary">Actualizar</button>
          <button id="logoutButton" class="btn-secondary">Cerrar sesion</button>
        </div>
      </div>

      <div class="card">
        <div class="week-toolbar">
          <div>
            <h2 class="section-title">Calendario semanal</h2>
            <p class="helper">Vista de lunes a viernes, ordenada de la hora mas temprana a la mas tarde.</p>
          </div>
          <div class="week-nav">
            <button id="prevWeekButton" class="btn-secondary" type="button">Semana anterior</button>
            <div id="weekTitle" class="week-title">Semana</div>
            <button id="nextWeekButton" class="btn-secondary" type="button">Semana siguiente</button>
          </div>
        </div>

        <div class="search-row">
          <input type="search" id="searchInput" placeholder="Buscar por nombre, correo, telefono, servicio u hora" />
        </div>

        <div id="weekGrid" class="week-grid"></div>
        <div id="adminStatus" class="status"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      deleteDoc,
      getFirestore,
      collection,
      doc,
      getDocs,
      orderBy,
      query,
      setDoc,
      serverTimestamp,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBc_r_3V9wmqWZpLeoBWZhRHJhy0F_zCIo",
      authDomain: "barberia-elite-d5912.firebaseapp.com",
      projectId: "barberia-elite-d5912",
      storageBucket: "barberia-elite-d5912.firebasestorage.app",
      messagingSenderId: "571109191013",
      appId: "1:571109191013:web:11cf4ad1b425e38d14858c"
    };

    const COLECCION_SOLICITUDES = "solicitudes_reserva";
    const COLECCION_AGENDA_PUBLICA = "agenda_publica";
    const ESTADOS_EDITABLES = ["cancelada", "completada"];
    const WEEKDAY_LABELS = ["Lunes", "Martes", "Miercoles", "Jueves", "Viernes"];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginSection = document.getElementById("loginSection");
    const adminSection = document.getElementById("adminSection");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginButton = document.getElementById("loginButton");
    const loginStatus = document.getElementById("loginStatus");
    const adminStatus = document.getElementById("adminStatus");
    const adminEmail = document.getElementById("adminEmail");
    const refreshButton = document.getElementById("refreshButton");
    const logoutButton = document.getElementById("logoutButton");
    const prevWeekButton = document.getElementById("prevWeekButton");
    const nextWeekButton = document.getElementById("nextWeekButton");
    const weekTitle = document.getElementById("weekTitle");
    const searchInput = document.getElementById("searchInput");
    const weekGrid = document.getElementById("weekGrid");

    let allRequests = [];
    let currentUser = null;
    let loadingRequests = false;
    let noteDrafts = {};
    let currentWeekStart = getMonday(new Date());

    function setStatus(node, message, type = "") {
      node.textContent = message;
      node.className = type ? `status ${type}` : "status";
    }

    function getStartOfDay(date) {
      const result = new Date(date);
      result.setHours(0, 0, 0, 0);
      return result;
    }

    function getMonday(date) {
      const current = getStartOfDay(date);
      const day = current.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      current.setDate(current.getDate() + diff);
      return current;
    }

    function addDays(date, amount) {
      const result = new Date(date);
      result.setDate(result.getDate() + amount);
      return result;
    }

    function formatShortDate(date) {
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${day}/${month}`;
    }

    function formatWeekRange(startDate) {
      const endDate = addDays(startDate, 4);
      return `${formatShortDate(startDate)} - ${formatShortDate(endDate)}`;
    }

    function formatCreatedDate(value) {
      if (!value?.toDate) {
        return "Sin fecha";
      }

      return new Intl.DateTimeFormat("es-CL", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(value.toDate());
    }

    function getSlotId(fechaISO, hora) {
      return `${fechaISO}_${hora.replace(":", "-")}`;
    }

    function getDraftNote(item) {
      return Object.prototype.hasOwnProperty.call(noteDrafts, item.id)
        ? noteDrafts[item.id]
        : (item.notaInterna || "");
    }

    function getAppointmentDate(item) {
      if (!item.fechaISO || !/^\d{4}-\d{2}-\d{2}$/.test(item.fechaISO)) {
        return null;
      }

      const [year, month, day] = item.fechaISO.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function getDisplayState(item) {
      return item.estado === "cancelada" ? "Cancelada"
        : item.estado === "completada" ? "Cliente listo"
        : "Activa";
    }

    function getBadgeClass(item) {
      return item.estado === "cancelada" ? "cancelada"
        : item.estado === "completada" ? "completada"
        : "activa";
    }

    function buildSearchText(item) {
      return [
        item.nombre,
        item.correo,
        item.telefono,
        item.servicio,
        item.fecha,
        item.fechaISO,
        item.hora,
        item.estado,
        item.notaInterna
      ].join(" ").toLowerCase();
    }

    function sortRequestsByAppointment(items) {
      return [...items].sort((a, b) => {
        const aDate = getAppointmentDate(a);
        const bDate = getAppointmentDate(b);

        if (aDate && bDate) {
          if (a.fechaISO !== b.fechaISO) {
            return a.fechaISO.localeCompare(b.fechaISO);
          }

          if ((a.hora || "") !== (b.hora || "")) {
            return String(a.hora || "").localeCompare(String(b.hora || ""));
          }
        }

        const aCreated = a.creadoEn?.toDate ? a.creadoEn.toDate().getTime() : 0;
        const bCreated = b.creadoEn?.toDate ? b.creadoEn.toDate().getTime() : 0;
        return bCreated - aCreated;
      });
    }

    function getVisibleRequests() {
      const weekEnd = addDays(currentWeekStart, 4);
      const search = searchInput.value.trim().toLowerCase();

      return sortRequestsByAppointment(
        allRequests.filter((item) => {
          const appointmentDate = getAppointmentDate(item);
          if (!appointmentDate) {
            return false;
          }

          if (!["pendiente", "confirmada"].includes(item.estado || "pendiente")) {
            return false;
          }

          const day = appointmentDate.getDay();
          if (day < 1 || day > 5) {
            return false;
          }

          if (appointmentDate < currentWeekStart || appointmentDate > weekEnd) {
            return false;
          }

          if (search && !buildSearchText(item).includes(search)) {
            return false;
          }

          return true;
        })
      );
    }

    function renderWeek() {
      const visibleRequests = getVisibleRequests();
      weekGrid.innerHTML = "";
      weekTitle.textContent = `Semana ${formatWeekRange(currentWeekStart)}`;

      WEEKDAY_LABELS.forEach((label, index) => {
        const dayDate = addDays(currentWeekStart, index);
        const isoDay = [
          dayDate.getFullYear(),
          String(dayDate.getMonth() + 1).padStart(2, "0"),
          String(dayDate.getDate()).padStart(2, "0")
        ].join("-");

        const dayRequests = visibleRequests.filter((item) => item.fechaISO === isoDay);

        const column = document.createElement("section");
        column.className = "day-column";

        const header = document.createElement("div");
        header.className = "day-header";

        const title = document.createElement("h3");
        title.textContent = `${label} ${formatShortDate(dayDate)}`;

        const count = document.createElement("div");
        count.className = "day-count";
        count.textContent = dayRequests.length
          ? `${dayRequests.length} reserva${dayRequests.length === 1 ? "" : "s"}`
          : "Sin reservas";

        header.appendChild(title);
        header.appendChild(count);
        column.appendChild(header);

        const content = document.createElement("div");
        content.className = "day-content";

        if (!dayRequests.length) {
          const empty = document.createElement("div");
          empty.className = "empty-day";
          empty.textContent = "Sin reservas";
          content.appendChild(empty);
        } else {
          dayRequests.forEach((item) => {
            const card = document.createElement("article");
            card.className = "reservation-card";

            const top = document.createElement("div");
            top.className = "reservation-top";

            const titleWrap = document.createElement("div");
            const hour = document.createElement("div");
            hour.className = "reservation-hour";
            hour.textContent = item.hora || "Sin hora";

            const name = document.createElement("div");
            name.className = "reservation-name";
            name.textContent = item.nombre || "Sin nombre";

            const created = document.createElement("div");
            created.className = "meta";
            created.textContent = `Creada ${formatCreatedDate(item.creadoEn)}`;

            titleWrap.appendChild(hour);
            titleWrap.appendChild(name);
            titleWrap.appendChild(created);

            const badge = document.createElement("span");
            badge.className = `badge ${getBadgeClass(item)}`;
            badge.textContent = getDisplayState(item);

            top.appendChild(titleWrap);
            top.appendChild(badge);
            card.appendChild(top);

            const lines = document.createElement("div");
            lines.className = "reservation-lines";

            const serviceLine = document.createElement("div");
            serviceLine.className = "reservation-line";
            serviceLine.innerHTML = `<strong>Servicio:</strong> ${item.servicio || "Sin dato"}`;

            const phoneLine = document.createElement("div");
            phoneLine.className = "reservation-line";
            phoneLine.innerHTML = `<strong>Telefono:</strong> ${item.telefono || "Sin dato"}`;

            const emailLine = document.createElement("div");
            emailLine.className = "reservation-line";
            emailLine.innerHTML = `<strong>Correo:</strong> ${item.correo || "Sin dato"}`;

            lines.appendChild(serviceLine);
            lines.appendChild(phoneLine);
            lines.appendChild(emailLine);
            card.appendChild(lines);

            const notesPanel = document.createElement("div");
            notesPanel.className = "notes-panel";

            const notesTitle = document.createElement("strong");
            notesTitle.textContent = "Notas internas";

            const notesTextarea = document.createElement("textarea");
            notesTextarea.value = getDraftNote(item);
            notesTextarea.placeholder = "Escribe una nota interna para esta reserva";
            notesTextarea.addEventListener("input", (event) => {
              noteDrafts[item.id] = event.target.value;
            });

            const notesActions = document.createElement("div");
            notesActions.className = "notes-actions";

            const saveNoteButton = document.createElement("button");
            saveNoteButton.className = "btn-secondary";
            saveNoteButton.textContent = "Guardar nota";
            saveNoteButton.addEventListener("click", () => {
              guardarNota(item.id);
            });

            notesActions.appendChild(saveNoteButton);
            notesPanel.appendChild(notesTitle);
            notesPanel.appendChild(notesTextarea);
            notesPanel.appendChild(notesActions);
            card.appendChild(notesPanel);

            const actions = document.createElement("div");
            actions.className = "reservation-actions";

            const doneButton = document.createElement("button");
            doneButton.className = "btn-info";
            doneButton.textContent = "Cliente listo";
            doneButton.addEventListener("click", () => {
              cambiarEstado(item.id, "completada");
            });

            const cancelButton = document.createElement("button");
            cancelButton.className = "btn-danger";
            cancelButton.textContent = "Cancelar";
            cancelButton.addEventListener("click", () => {
              cambiarEstado(item.id, "cancelada");
            });

            actions.appendChild(doneButton);
            actions.appendChild(cancelButton);
            card.appendChild(actions);
            content.appendChild(card);
          });
        }

        column.appendChild(content);
        weekGrid.appendChild(column);
      });
    }

    async function loadRequests() {
      if (!currentUser || loadingRequests) {
        return;
      }

      loadingRequests = true;
      refreshButton.disabled = true;
      setStatus(adminStatus, "Cargando reservas...");

      try {
        const requestsQuery = query(collection(db, COLECCION_SOLICITUDES), orderBy("creadoEn", "desc"));
        const snapshot = await getDocs(requestsQuery);
        allRequests = snapshot.docs.map((item) => ({
          id: item.id,
          ...item.data()
        }));
        renderWeek();
        setStatus(adminStatus, `${allRequests.length} reservas cargadas.`, "success");
      } catch (error) {
        console.error("Error al cargar reservas:", error);
        setStatus(adminStatus, "No se pudieron cargar las reservas.", "error");
      } finally {
        loadingRequests = false;
        refreshButton.disabled = false;
      }
    }

    async function enviarCorreoGestion(item, nuevoEstado) {
      const response = await fetch("/api/send-booking-email", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          notificationType: "customer_status",
          barbero: item.barbero,
          nombre: item.nombre,
          correo: item.correo,
          telefono: item.telefono,
          servicio: item.servicio,
          fecha: item.fecha,
          hora: item.hora,
          estado: nuevoEstado === "cancelada" ? "Cancelada" : "Cliente listo",
          notaInterna: getDraftNote(item)
        })
      });

      if (!response.ok) {
        throw new Error(`Email endpoint error: ${response.status}`);
      }
    }

    async function sincronizarDisponibilidadPublica(item, nuevoEstado) {
      if (!item.fechaISO) {
        return;
      }

      const slotRef = doc(db, COLECCION_AGENDA_PUBLICA, getSlotId(item.fechaISO, item.hora));

      if (nuevoEstado === "cancelada" || nuevoEstado === "completada") {
        await deleteDoc(slotRef);
        return;
      }

      await setDoc(slotRef, {
        barbero: item.barbero,
        fecha: item.fecha,
        fechaISO: item.fechaISO,
        hora: item.hora,
        estado: nuevoEstado,
        actualizadoEn: serverTimestamp()
      }, { merge: true });
    }

    async function guardarNota(id) {
      if (!currentUser) {
        return;
      }

      const item = allRequests.find((request) => request.id === id);
      if (!item) {
        return;
      }

      const notaInterna = (getDraftNote(item) || "").trim();
      if (notaInterna === (item.notaInterna || "")) {
        setStatus(adminStatus, "La nota no tiene cambios.");
        return;
      }

      setStatus(adminStatus, "Guardando nota interna...");

      try {
        await updateDoc(doc(db, COLECCION_SOLICITUDES, id), {
          notaInterna,
          notaActualizadaEn: serverTimestamp(),
          notaActualizadaPor: currentUser.email
        });

        setStatus(adminStatus, "Nota interna guardada.", "success");
        await loadRequests();
      } catch (error) {
        console.error("Error al guardar nota:", error);
        setStatus(adminStatus, "No se pudo guardar la nota interna.", "error");
      }
    }

    async function cambiarEstado(id, nuevoEstado) {
      if (!currentUser || !ESTADOS_EDITABLES.includes(nuevoEstado)) {
        return;
      }

      const item = allRequests.find((request) => request.id === id);
      if (!item) {
        return;
      }

      setStatus(adminStatus, `Actualizando reserva a ${nuevoEstado}...`);

      try {
        const updatePayload = {
          estado: nuevoEstado,
          notaInterna: (getDraftNote(item) || "").trim(),
          notaActualizadaEn: serverTimestamp(),
          notaActualizadaPor: currentUser.email
        };

        if (nuevoEstado === "cancelada") {
          updatePayload.gestionadoEn = serverTimestamp();
          updatePayload.gestionadoPor = currentUser.email;
        }

        if (nuevoEstado === "completada") {
          updatePayload.finalizadoEn = serverTimestamp();
          updatePayload.finalizadoPor = currentUser.email;
        }

        await updateDoc(doc(db, COLECCION_SOLICITUDES, id), updatePayload);
        await sincronizarDisponibilidadPublica(item, nuevoEstado);

        if (nuevoEstado === "cancelada") {
          try {
            await enviarCorreoGestion(item, nuevoEstado);
            setStatus(adminStatus, "Reserva cancelada y correo enviado al cliente.", "success");
          } catch (emailError) {
            console.error("Error al enviar correo al cliente:", emailError);
            setStatus(adminStatus, "Reserva cancelada, pero fallo el correo al cliente.", "error");
          }
        } else {
          setStatus(adminStatus, "Reserva marcada como cliente listo.", "success");
        }

        await loadRequests();
      } catch (error) {
        console.error("Error al actualizar reserva:", error);
        setStatus(adminStatus, "No se pudo actualizar la reserva.", "error");
      }
    }

    loginButton.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        setStatus(loginStatus, "Completa correo y contrasena.", "error");
        return;
      }

      loginButton.disabled = true;
      setStatus(loginStatus, "Iniciando sesion...");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        passwordInput.value = "";
      } catch (error) {
        console.error("Error al iniciar sesion:", error);
        setStatus(loginStatus, "No se pudo iniciar sesion. Revisa correo, contrasena y Auth en Firebase.", "error");
      } finally {
        loginButton.disabled = false;
      }
    });

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        loginButton.click();
      }
    });

    refreshButton.addEventListener("click", () => {
      loadRequests();
    });

    logoutButton.addEventListener("click", async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("Error al cerrar sesion:", error);
      }
    });

    prevWeekButton.addEventListener("click", () => {
      currentWeekStart = addDays(currentWeekStart, -7);
      renderWeek();
    });

    nextWeekButton.addEventListener("click", () => {
      currentWeekStart = addDays(currentWeekStart, 7);
      renderWeek();
    });

    searchInput.addEventListener("input", renderWeek);

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;

      if (!user) {
        loginSection.classList.remove("hidden");
        adminSection.classList.add("hidden");
        adminEmail.textContent = "";
        allRequests = [];
        noteDrafts = {};
        weekGrid.innerHTML = "";
        setStatus(loginStatus, "");
        return;
      }

      loginSection.classList.add("hidden");
      adminSection.classList.remove("hidden");
      adminEmail.textContent = user.email || "";
      currentWeekStart = getMonday(new Date());
      setStatus(loginStatus, "");
      await loadRequests();
    });
  </script>
</body>
</html>
