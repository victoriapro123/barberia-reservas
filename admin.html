<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barber Elite Admin</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --panel: #141414;
      --panel-2: #1b1b1b;
      --border: #2d2d2d;
      --text: #f6f6f6;
      --muted: #bdbdbd;
      --accent: #c7a86b;
      --danger: #d97777;
      --success: #7fd28c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(199, 168, 107, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .brand p {
      color: var(--muted);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }

    .login-card {
      max-width: 460px;
      margin: 64px auto 0;
    }

    .login-card h2,
    .section-title {
      margin-bottom: 14px;
    }

    .login-card p,
    .empty,
    .meta,
    .helper {
      color: var(--muted);
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #343434;
      background: #101010;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .btn-primary {
      background: var(--accent);
      color: black;
      font-weight: bold;
    }

    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-success {
      background: rgba(127, 210, 140, 0.14);
      color: var(--success);
      border: 1px solid rgba(127, 210, 140, 0.28);
    }

    .btn-danger {
      background: rgba(217, 119, 119, 0.14);
      color: #ffb5b5;
      border: 1px solid rgba(217, 119, 119, 0.28);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 12px;
    }

    .status.error {
      color: #ffb5b5;
    }

    .status.success {
      color: var(--success);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .request-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .request-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .request-top h3 {
      font-size: 1.1rem;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: capitalize;
    }

    .badge.pendiente {
      background: rgba(199, 168, 107, 0.14);
      color: #f0d39a;
      border: 1px solid rgba(199, 168, 107, 0.28);
    }

    .badge.confirmada {
      background: rgba(127, 210, 140, 0.14);
      color: var(--success);
      border: 1px solid rgba(127, 210, 140, 0.28);
    }

    .badge.cancelada {
      background: rgba(217, 119, 119, 0.14);
      color: #ffb5b5;
      border: 1px solid rgba(217, 119, 119, 0.28);
    }

    .details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .detail {
      background: #101010;
      border: 1px solid #252525;
      border-radius: 12px;
      padding: 12px;
    }

    .detail strong {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .request-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .brand h1 {
        font-size: 1.6rem;
      }

      .request-actions button,
      .toolbar-actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="loginSection" class="card login-card">
      <h2>Acceso admin</h2>
      <p>Inicia sesion con tu cuenta de Firebase para revisar y gestionar solicitudes.</p>
      <div class="form-grid">
        <input type="email" id="emailInput" placeholder="Correo admin" autocomplete="email" />
        <input type="password" id="passwordInput" placeholder="Contrasena" autocomplete="current-password" />
        <button id="loginButton" class="btn-primary">Entrar</button>
      </div>
      <div id="loginStatus" class="status"></div>
    </section>

    <section id="adminSection" class="hidden">
      <div class="topbar">
        <div class="brand">
          <h1>Panel de solicitudes</h1>
          <p>Gestion privada de solicitudes de Barber Elite.</p>
        </div>
        <div class="toolbar-actions">
          <span id="adminEmail" class="helper"></span>
          <button id="refreshButton" class="btn-secondary">Actualizar</button>
          <button id="logoutButton" class="btn-secondary">Cerrar sesion</button>
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <div>
            <h2 class="section-title">Solicitudes</h2>
            <p class="helper">Solo tu cuenta admin puede ver y cambiar estados.</p>
          </div>
          <div class="toolbar-actions">
            <select id="filterEstado">
              <option value="todas">Todas</option>
              <option value="pendiente">Pendientes</option>
              <option value="confirmada">Confirmadas</option>
              <option value="cancelada">Canceladas</option>
            </select>
          </div>
        </div>

        <div id="requestsContainer" class="grid"></div>
        <div id="emptyState" class="empty hidden">No hay solicitudes para el filtro actual.</div>
        <div id="adminStatus" class="status"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      doc,
      getDocs,
      orderBy,
      query,
      serverTimestamp,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBc_r_3V9wmqWZpLeoBWZhRHJhy0F_zCIo",
      authDomain: "barberia-elite-d5912.firebaseapp.com",
      projectId: "barberia-elite-d5912",
      storageBucket: "barberia-elite-d5912.firebasestorage.app",
      messagingSenderId: "571109191013",
      appId: "1:571109191013:web:11cf4ad1b425e38d14858c"
    };

    const COLECCION_SOLICITUDES = "solicitudes_reserva";
    const ESTADOS_EDITABLES = ["confirmada", "cancelada"];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginSection = document.getElementById("loginSection");
    const adminSection = document.getElementById("adminSection");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginButton = document.getElementById("loginButton");
    const loginStatus = document.getElementById("loginStatus");
    const adminStatus = document.getElementById("adminStatus");
    const adminEmail = document.getElementById("adminEmail");
    const refreshButton = document.getElementById("refreshButton");
    const logoutButton = document.getElementById("logoutButton");
    const requestsContainer = document.getElementById("requestsContainer");
    const emptyState = document.getElementById("emptyState");
    const filterEstado = document.getElementById("filterEstado");

    let allRequests = [];
    let currentUser = null;
    let loadingRequests = false;

    function setStatus(node, message, type = "") {
      node.textContent = message;
      node.className = type ? `status ${type}` : "status";
    }

    function formatDate(value) {
      if (!value?.toDate) {
        return "Sin fecha";
      }

      return new Intl.DateTimeFormat("es-CL", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(value.toDate());
    }

    function formatEstado(estado) {
      return estado || "pendiente";
    }

    function renderRequests() {
      const filtro = filterEstado.value;
      const filtered = filtro === "todas"
        ? allRequests
        : allRequests.filter((item) => item.estado === filtro);

      requestsContainer.innerHTML = "";

      if (!filtered.length) {
        emptyState.classList.remove("hidden");
        return;
      }

      emptyState.classList.add("hidden");

      filtered.forEach((item) => {
        const card = document.createElement("article");
        card.className = "request-card";

        const top = document.createElement("div");
        top.className = "request-top";

        const titleWrap = document.createElement("div");
        const title = document.createElement("h3");
        title.textContent = item.nombre;
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `Creada ${formatDate(item.creadoEn)}`;
        titleWrap.appendChild(title);
        titleWrap.appendChild(meta);

        const badge = document.createElement("span");
        badge.className = `badge ${formatEstado(item.estado)}`;
        badge.textContent = formatEstado(item.estado);

        top.appendChild(titleWrap);
        top.appendChild(badge);
        card.appendChild(top);

        const details = document.createElement("div");
        details.className = "details";

        const detailEntries = [
          ["Servicio", item.servicio],
          ["Dia", item.fecha],
          ["Hora", item.hora],
          ["Correo", item.correo],
          ["Telefono", item.telefono],
          ["Gestion", item.gestionadoEn ? `${item.gestionadoPor || "Admin"} · ${formatDate(item.gestionadoEn)}` : "Pendiente"]
        ];

        detailEntries.forEach(([label, value]) => {
          const detail = document.createElement("div");
          detail.className = "detail";
          const strong = document.createElement("strong");
          strong.textContent = label;
          const content = document.createElement("div");
          content.textContent = value || "Sin dato";
          detail.appendChild(strong);
          detail.appendChild(content);
          details.appendChild(detail);
        });

        card.appendChild(details);

        if (item.estado === "pendiente") {
          const actions = document.createElement("div");
          actions.className = "request-actions";

          const confirmButton = document.createElement("button");
          confirmButton.className = "btn-success";
          confirmButton.textContent = "Confirmar";
          confirmButton.addEventListener("click", () => {
            cambiarEstado(item.id, "confirmada");
          });

          const cancelButton = document.createElement("button");
          cancelButton.className = "btn-danger";
          cancelButton.textContent = "Cancelar";
          cancelButton.addEventListener("click", () => {
            cambiarEstado(item.id, "cancelada");
          });

          actions.appendChild(confirmButton);
          actions.appendChild(cancelButton);
          card.appendChild(actions);
        }

        requestsContainer.appendChild(card);
      });
    }

    async function loadRequests() {
      if (!currentUser || loadingRequests) {
        return;
      }

      loadingRequests = true;
      refreshButton.disabled = true;
      setStatus(adminStatus, "Cargando solicitudes...");

      try {
        const q = query(collection(db, COLECCION_SOLICITUDES), orderBy("creadoEn", "desc"));
        const snapshot = await getDocs(q);
        allRequests = snapshot.docs.map((item) => ({
          id: item.id,
          ...item.data()
        }));
        renderRequests();
        setStatus(adminStatus, `${allRequests.length} solicitudes cargadas.`, "success");
      } catch (error) {
        console.error("Error al cargar solicitudes:", error);
        setStatus(adminStatus, "No se pudieron cargar las solicitudes.", "error");
      } finally {
        loadingRequests = false;
        refreshButton.disabled = false;
      }
    }

    async function cambiarEstado(id, nuevoEstado) {
      if (!currentUser || !ESTADOS_EDITABLES.includes(nuevoEstado)) {
        return;
      }

      setStatus(adminStatus, `Actualizando solicitud a ${nuevoEstado}...`);

      try {
        await updateDoc(doc(db, COLECCION_SOLICITUDES, id), {
          estado: nuevoEstado,
          gestionadoEn: serverTimestamp(),
          gestionadoPor: currentUser.email
        });

        setStatus(adminStatus, `Solicitud marcada como ${nuevoEstado}.`, "success");
        await loadRequests();
      } catch (error) {
        console.error("Error al actualizar solicitud:", error);
        setStatus(adminStatus, "No se pudo actualizar la solicitud.", "error");
      }
    }

    loginButton.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        setStatus(loginStatus, "Completa correo y contrasena.", "error");
        return;
      }

      loginButton.disabled = true;
      setStatus(loginStatus, "Iniciando sesion...");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        passwordInput.value = "";
      } catch (error) {
        console.error("Error al iniciar sesion:", error);
        setStatus(loginStatus, "No se pudo iniciar sesion. Revisa correo, contrasena y Auth en Firebase.", "error");
      } finally {
        loginButton.disabled = false;
      }
    });

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        loginButton.click();
      }
    });

    refreshButton.addEventListener("click", () => {
      loadRequests();
    });

    logoutButton.addEventListener("click", async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("Error al cerrar sesion:", error);
      }
    });

    filterEstado.addEventListener("change", () => {
      renderRequests();
    });

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;

      if (!user) {
        loginSection.classList.remove("hidden");
        adminSection.classList.add("hidden");
        adminEmail.textContent = "";
        allRequests = [];
        requestsContainer.innerHTML = "";
        emptyState.classList.add("hidden");
        setStatus(loginStatus, "");
        return;
      }

      loginSection.classList.add("hidden");
      adminSection.classList.remove("hidden");
      adminEmail.textContent = user.email || "";
      setStatus(loginStatus, "");
      await loadRequests();
    });
  </script>
</body>
</html>
