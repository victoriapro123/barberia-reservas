<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba Webpay | Jardín Flor de Loto</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: #071915;
      color: #fff8d8;
      font-family: "Segoe UI", sans-serif;
    }
    .card {
      width: min(560px, 100%);
      background: #fffaf0;
      color: #13332b;
      border-radius: 2px;
      padding: 28px;
      display: grid;
      gap: 16px;
    }
    h1 { margin: 0; font-size: 2rem; }
    p { margin: 0; line-height: 1.6; color: #607568; }
    button {
      min-height: 54px;
      border: 0;
      border-radius: 2px;
      background: #173f31;
      color: #fff8d8;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 24px;
      color: #607568;
      font-weight: 700;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Prueba rápida Webpay</h1>
    <p>Este acceso crea una transacción de integración por <strong>$1.000</strong>, genera el <strong>token_ws</strong> y te redirige a Webpay Plus de prueba.</p>
    <p>Usa tarjeta de crédito de prueba, sin cuotas, y revisa el resultado al volver.</p>
    <button id="payButton" type="button">Generar pago de prueba</button>
    <div class="status" id="status"></div>
  </section>

  <script>
    const button = document.getElementById("payButton");
    const status = document.getElementById("status");

    button.addEventListener("click", async () => {
      button.disabled = true;
      status.textContent = "Creando transacción de prueba...";

      try {
        const response = await fetch("/api/webpay/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: 1000,
            customer: {
              nombre: "Prueba Webpay",
              correo: "prueba@jardinflordeloto.cl",
              telefono: "+56900000000"
            },
            order: {
              pack: "Prueba Webpay",
              planta: "Prueba",
              macetero: "Prueba",
              globo: "Sin globo",
              delivery: false,
              deliveryExtra: 0,
              total: 1000,
              direccion: "",
              observaciones: "Prueba de integración Webpay Plus"
            }
          })
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || "No se pudo crear la transacción.");
        }

        status.textContent = `token_ws generado: ${payload.token_ws}`;
        const form = document.createElement("form");
        form.method = "POST";
        form.action = payload.url;
        form.style.display = "none";

        const tokenInput = document.createElement("input");
        tokenInput.type = "hidden";
        tokenInput.name = "token_ws";
        tokenInput.value = payload.token_ws;
        form.appendChild(tokenInput);

        document.body.appendChild(form);
        window.setTimeout(() => form.submit(), 900);
      } catch (error) {
        console.error(error);
        status.textContent = error.message || "No se pudo iniciar la prueba.";
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
