<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultado del pago | Jardín Flor de Loto</title>
  <link rel="icon" href="/assets/jardin-flor-de-loto-logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/jardin-flor-de-loto-logo.png" />
  <meta name="theme-color" content="#071915" />
  <meta property="og:title" content="Jardín Flor de Loto" />
  <meta property="og:description" content="Resultado de pago seguro con Webpay Plus." />
  <meta property="og:image" content="/assets/jardin-flor-de-loto-logo.png" />
  <style>
    :root {
      --bg: #071915;
      --panel: #fffaf0;
      --panel-soft: #eef4df;
      --paper: #fffdf8;
      --text: #13332b;
      --muted: #61746b;
      --accent: #d9c463;
      --border: rgba(217, 196, 99, 0.24);
      --success: #2f7d4a;
      --danger: #a84141;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        linear-gradient(180deg, rgba(4, 18, 16, 0.88), rgba(5, 22, 19, 0.96)),
        url("/assets/flor-de-loto-portada.png") center/cover no-repeat;
      color: #fff8d8;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    .card {
      width: min(920px, 100%);
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 2px;
      box-shadow: 0 32px 90px rgba(0, 12, 10, 0.34);
      overflow: hidden;
    }

    .head {
      padding: clamp(24px, 5vw, 42px);
      background:
        linear-gradient(135deg, rgba(238, 244, 223, 0.96), rgba(255, 250, 240, 0.98));
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 12px;
    }

    .eyebrow {
      width: fit-content;
      padding: 8px 12px;
      background: rgba(47, 125, 74, 0.08);
      border: 1px solid rgba(47, 125, 74, 0.16);
      color: #2f7d4a;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.92;
      letter-spacing: -0.07em;
    }

    .subtitle {
      max-width: 720px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.6;
    }

    .body {
      padding: clamp(20px, 4vw, 34px);
      display: grid;
      gap: 18px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 16px;
    }

    .panel {
      background: var(--paper);
      border: 1px solid rgba(19, 51, 43, 0.08);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .panel h2 {
      font-size: 1.18rem;
      letter-spacing: -0.02em;
    }

    .rows {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(19, 51, 43, 0.08);
    }

    .row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .row span {
      color: var(--muted);
      font-weight: 800;
    }

    .row strong {
      text-align: right;
      word-break: break-word;
    }

    .total {
      margin-top: 4px;
      padding: 16px;
      background: var(--panel-soft);
      border: 1px solid rgba(47, 125, 74, 0.14);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 1.12rem;
      font-weight: 900;
    }

    .pickup {
      background: #173f31;
      color: #fff8d8;
      border-color: rgba(255, 248, 216, 0.16);
    }

    .pickup p {
      color: rgba(255, 248, 216, 0.82);
      line-height: 1.55;
    }

    .pickup strong {
      display: block;
      font-size: 1.2rem;
      line-height: 1.25;
    }

    .map-card {
      padding: 0;
      overflow: hidden;
      gap: 0;
    }

    .map-card h2,
    .map-card p,
    .map-card strong {
      margin-left: 18px;
      margin-right: 18px;
    }

    .map-card h2 {
      margin-top: 18px;
    }

    .map-card p {
      margin-top: 12px;
    }

    .map-card strong {
      margin-top: 6px;
      margin-bottom: 18px;
    }

    .map-frame {
      width: 100%;
      min-height: 230px;
      border: 0;
      display: block;
      filter: saturate(0.92) contrast(0.98);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .button {
      min-height: 52px;
      padding: 0 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #173f31;
      color: #fff8d8;
      text-decoration: none;
      font-weight: 900;
      border-radius: 2px;
      border: 1px solid rgba(23, 63, 49, 0.12);
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
      border-color: rgba(19, 51, 43, 0.16);
    }

    .button.map {
      background: var(--accent);
      color: #173f31;
    }

    .loading {
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .row {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .row strong {
        text-align: left;
      }

      .actions .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <article class="card">
    <header class="head" id="resultHead">
      <span class="eyebrow">Webpay Plus</span>
      <h1>Confirmando pago</h1>
      <p class="subtitle">Estamos verificando el resultado de tu compra.</p>
    </header>
    <section class="body" id="resultBody">
      <p class="loading">Confirmando tu pago con Webpay...</p>
    </section>
  </article>

  <script>
    const PICKUP_ADDRESS = "Av. Miraflores 2000, Peñaflor";
    const MAP_URL = "https://www.google.com/maps/place/Jardin+Flor+De+Loto/@-33.5995343,-70.8746083,17z/data=!3m1!4b1!4m6!3m5!1s0x9662e768a1093607:0x944e9533cf33b7a9!8m2!3d-33.5995388!4d-70.8720334!16s%2Fg%2F11t_z8yq3c";
    const MAP_EMBED_URL = "https://www.google.com/maps?q=-33.5995388,-70.8720334&z=17&output=embed";

    const resultHead = document.getElementById("resultHead");
    const resultBody = document.getElementById("resultBody");
    const params = new URLSearchParams(window.location.search);
    const tokenWs = params.get("token_ws") || "";
    const tbkToken = params.get("TBK_TOKEN") || "";
    const buyOrder = params.get("TBK_ORDEN_COMPRA") || "";
    const sessionId = params.get("TBK_ID_SESION") || "";
    const webpayEnv = params.get("webpay_env") || "integration";
    const webpayFlow = params.get("webpay_flow") || "checkout";
    const previewMode = params.get("preview") === "aprobado";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function valueOrDefault(value) {
      const normalized = String(value || "").trim();
      return normalized || "No especificado";
    }

    function formatAmount(value) {
      const amount = Number(value || 0);
      return new Intl.NumberFormat("es-CL", {
        style: "currency",
        currency: "CLP",
        maximumFractionDigits: 0
      }).format(amount);
    }

    function renderHeader(approved) {
      resultHead.innerHTML = approved
        ? `
          <span class="eyebrow">Compra confirmada</span>
          <h1>¡Pago aprobado!</h1>
          <p class="subtitle">Gracias por tu compra. Tu pedido fue recibido correctamente.</p>
        `
        : `
          <span class="eyebrow">Pago no confirmado</span>
          <h1>Pago rechazado</h1>
          <p class="subtitle">Tu compra no fue confirmada. Puedes intentarlo nuevamente.</p>
        `;
    }

    function renderApproved(data) {
      const order = data.order || {};
      renderHeader(true);

      resultBody.innerHTML = `
        <section class="summary">
          <div class="panel">
            <h2>Detalle del pedido</h2>
            <div class="rows">
              <div class="row"><span>Pack seleccionado</span><strong>${escapeHtml(valueOrDefault(order.pack))}</strong></div>
              <div class="row"><span>Planta seleccionada</span><strong>${escapeHtml(valueOrDefault(order.planta))}</strong></div>
              <div class="row"><span>Macetero seleccionado</span><strong>${escapeHtml(valueOrDefault(order.macetero))}</strong></div>
              <div class="row"><span>Globo seleccionado</span><strong>${escapeHtml(valueOrDefault(order.globo))}</strong></div>
              ${order.delivery ? `<div class="row"><span>Delivery</span><strong>Incluido (${escapeHtml(formatAmount(order.deliveryExtra || 0))})</strong></div>` : ""}
            </div>
            <div class="total"><span>Monto pagado</span><strong>${escapeHtml(formatAmount(data.amount || order.total || 0))}</strong></div>
          </div>

          <div class="panel pickup map-card">
            <h2>Retiro</h2>
            <iframe
              class="map-frame"
              src="${MAP_EMBED_URL}"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="Mapa de Jardín Flor de Loto"
            ></iframe>
            <p>Tu pedido estará disponible para retiro en:</p>
            <strong>${escapeHtml(PICKUP_ADDRESS)}</strong>
          </div>
        </section>

        <section class="panel">
          <h2>Datos útiles</h2>
          <div class="rows">
            <div class="row"><span>Número de orden</span><strong>${escapeHtml(valueOrDefault(data.buy_order))}</strong></div>
            <div class="row"><span>Código de autorización</span><strong>${escapeHtml(valueOrDefault(data.authorization_code))}</strong></div>
            <div class="row"><span>Tipo de pago</span><strong>${escapeHtml(valueOrDefault(data.payment_type_code))}</strong></div>
          </div>
        </section>

        <div class="actions">
          <a class="button" href="/">Volver al inicio</a>
          <a class="button secondary" href="/">Hacer otro pedido</a>
          <a class="button map" href="${MAP_URL}" target="_blank" rel="noopener">Ver ubicación en Google Maps</a>
        </div>
      `;
    }

    function renderRejected() {
      renderHeader(false);
      resultBody.innerHTML = `
        <section class="panel">
          <h2>Tu compra no fue confirmada</h2>
          <p class="loading">No se realizó el cargo o Webpay rechazó la transacción. Puedes volver a comprar e intentarlo nuevamente.</p>
        </section>
        <div class="actions">
          <a class="button" href="/">Volver a comprar</a>
          <a class="button secondary" href="/">Volver al inicio</a>
        </div>
      `;
    }

    function renderError(message) {
      renderHeader(false);
      resultBody.innerHTML = `
        <section class="panel">
          <h2>No se pudo confirmar el pago</h2>
          <p class="loading">${escapeHtml(message)}</p>
        </section>
        <div class="actions">
          <a class="button" href="/">Volver a comprar</a>
          <a class="button secondary" href="/">Volver al inicio</a>
        </div>
      `;
    }

    function renderResult(data) {
      if (data.approved) {
        renderApproved(data);
        return;
      }

      renderRejected();
    }

    async function main() {
      if (previewMode) {
        renderResult({
          approved: true,
          buy_order: "ORDEN-DEMO-001",
          authorization_code: "123456",
          payment_type_code: "VD",
          amount: 15000,
          order: {
            pack: "Básico",
            planta: "Scindapsus",
            macetero: "Macetero 1",
            globo: "Globo 1",
            delivery: false,
            deliveryExtra: 0,
            total: 15000
          }
        });
        return;
      }

      if (!tokenWs && !tbkToken) {
        renderError("No se recibió ningún token de retorno desde Webpay.");
        return;
      }

      if (tbkToken) {
        renderResult({
          approved: false,
          status: "rechazado",
          buy_order: buyOrder,
          session_id: sessionId
        });
        return;
      }

      try {
        const commitEndpoint = webpayEnv === "production" && webpayFlow === "production-test"
          ? "/api/webpay/commit-production-test"
          : "/api/webpay/commit";
        const response = await fetch(`${commitEndpoint}?token_ws=${encodeURIComponent(tokenWs)}&webpay_env=${encodeURIComponent(webpayEnv)}&format=json`);
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || "No se pudo confirmar el pago.");
        }

        renderResult(payload);
      } catch (error) {
        console.error(error);
        renderError(error.message || "No se pudo confirmar el pago.");
      }
    }

    main();
  </script>
</body>
</html>
