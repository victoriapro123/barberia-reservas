<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultado del pago | Jardin Flor de Loto</title>
  <link rel="icon" href="/assets/jardin-flor-de-loto-logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/jardin-flor-de-loto-logo.png" />
  <meta name="theme-color" content="#071915" />
  <meta property="og:title" content="Jardin Flor de Loto" />
  <meta property="og:description" content="Resultado de pago seguro con Webpay Plus." />
  <meta property="og:image" content="/assets/jardin-flor-de-loto-logo.png" />
  <style>
    :root {
      --bg: #071915;
      --panel: #fffaf0;
      --panel-soft: #eef4df;
      --text: #13332b;
      --muted: #61746b;
      --accent: #d9c463;
      --border: rgba(217, 196, 99, 0.22);
      --success: #2f7d4a;
      --danger: #a84141;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        linear-gradient(180deg, rgba(4, 18, 16, 0.88), rgba(5, 22, 19, 0.95)),
        url("/assets/flor-de-loto-portada.png") center/cover no-repeat;
      color: #fff8d8;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    .card {
      width: min(820px, 100%);
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 2px;
      box-shadow: 0 32px 80px rgba(0, 12, 10, 0.3);
      overflow: hidden;
    }

    .head {
      padding: 24px;
      background: var(--panel-soft);
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 10px;
    }

    .eyebrow {
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6e7e53;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .copy {
      color: var(--muted);
      line-height: 1.6;
    }

    .body {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .status-chip {
      width: fit-content;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-weight: 900;
    }

    .status-chip.aprobado {
      color: var(--success);
      border-color: rgba(47, 125, 74, 0.24);
      background: rgba(47, 125, 74, 0.08);
    }

    .status-chip.rechazado {
      color: var(--danger);
      border-color: rgba(168, 65, 65, 0.24);
      background: rgba(168, 65, 65, 0.08);
    }

    .message {
      padding: 18px;
      background: #fffdf8;
      border: 1px solid rgba(19, 51, 43, 0.08);
      display: grid;
      gap: 8px;
    }

    .message strong {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      background: #fffdf8;
      border: 1px solid rgba(19, 51, 43, 0.08);
      border-radius: 2px;
      padding: 14px;
      display: grid;
      gap: 6px;
      min-height: 92px;
    }

    .field span {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .field strong {
      word-break: break-word;
      line-height: 1.35;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      min-height: 50px;
      padding: 0 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #173f31;
      color: #fff8d8;
      text-decoration: none;
      font-weight: 900;
      border-radius: 2px;
      border: 1px solid rgba(23, 63, 49, 0.12);
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
      border-color: rgba(19, 51, 43, 0.12);
    }

    .loading {
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .actions .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <article class="card">
    <header class="head">
      <span class="eyebrow">Webpay Plus</span>
      <h1>Resultado del pago</h1>
      <p class="copy">Aqui veras el estado final de tu pago dentro de Jardin Flor de Loto.</p>
    </header>
    <section class="body" id="resultBody">
      <p class="loading">Confirmando tu pago con Webpay...</p>
    </section>
  </article>

  <script>
    const resultBody = document.getElementById("resultBody");
    const params = new URLSearchParams(window.location.search);
    const tokenWs = params.get("token_ws") || "";
    const tbkToken = params.get("TBK_TOKEN") || "";
    const buyOrder = params.get("TBK_ORDEN_COMPRA") || "";
    const sessionId = params.get("TBK_ID_SESION") || "";
    const webpayEnv = params.get("webpay_env") || "integration";
    const webpayFlow = params.get("webpay_flow") || "checkout";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatAmount(value) {
      const amount = Number(value || 0);
      return new Intl.NumberFormat("es-CL", {
        style: "currency",
        currency: "CLP",
        maximumFractionDigits: 0
      }).format(amount);
    }

    function renderResult(data) {
      const approved = Boolean(data.approved);
      const statusText = approved ? "Pago aprobado" : "Pago rechazado";
      const messageTitle = approved ? "Gracias por tu compra" : "No se pudo completar el pago";
      const messageCopy = approved
        ? "Tu pedido fue confirmado correctamente. Guardamos el resultado del pago."
        : "Puedes volver al inicio e intentar nuevamente cuando quieras.";

      resultBody.innerHTML = `
        <div class="status-chip ${approved ? "aprobado" : "rechazado"}">${statusText}</div>
        <section class="message">
          <strong>${messageTitle}</strong>
          <p class="copy">${messageCopy}</p>
        </section>
        <div class="grid">
          <div class="field"><span>Estado</span><strong>${escapeHtml(data.status || statusText)}</strong></div>
          <div class="field"><span>Monto pagado</span><strong>${escapeHtml(formatAmount(data.amount || 0))}</strong></div>
          <div class="field"><span>Codigo de autorizacion</span><strong>${escapeHtml(data.authorization_code || "No aplica")}</strong></div>
          <div class="field"><span>Numero de orden</span><strong>${escapeHtml(data.buy_order || "")}</strong></div>
          <div class="field"><span>Tipo de pago</span><strong>${escapeHtml(data.payment_type_code || "No informado")}</strong></div>
          <div class="field"><span>Cuotas</span><strong>${escapeHtml(data.installments_number ?? 0)}</strong></div>
          <div class="field"><span>Ambiente</span><strong>${escapeHtml(data.environment || webpayEnv)}</strong></div>
          <div class="field" style="grid-column: 1 / -1;"><span>token_ws</span><strong>${escapeHtml(data.token_ws || "")}</strong></div>
        </div>
        <div class="actions">
          <a class="button" href="/">Volver al inicio</a>
          <a class="button secondary" href="/">Seguir comprando</a>
        </div>
      `;
    }

    function renderError(message) {
      resultBody.innerHTML = `
        <div class="status-chip rechazado">Pago rechazado</div>
        <section class="message">
          <strong>No se pudo confirmar</strong>
          <p class="copy">${escapeHtml(message)}</p>
        </section>
        <div class="actions">
          <a class="button" href="/">Volver al inicio</a>
          <a class="button secondary" href="/">Intentar nuevamente</a>
        </div>
      `;
    }

    async function main() {
      if (!tokenWs && !tbkToken) {
        renderError("No se recibio ningun token de retorno desde Webpay.");
        return;
      }

      if (tbkToken) {
        renderResult({
          approved: false,
          status: "rechazado",
          buy_order: buyOrder,
          authorization_code: "",
          payment_type_code: "",
          installments_number: 0,
          amount: 0,
          token_ws: tbkToken,
          session_id: sessionId,
          environment: webpayEnv
        });
        return;
      }

      try {
        const commitEndpoint = webpayEnv === "production" && webpayFlow === "production-test"
          ? "/api/webpay/commit-production-test"
          : "/api/webpay/commit";
        const response = await fetch(`${commitEndpoint}?token_ws=${encodeURIComponent(tokenWs)}&webpay_env=${encodeURIComponent(webpayEnv)}&format=json`);
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || "No se pudo confirmar el pago.");
        }

        renderResult(payload);
      } catch (error) {
        console.error(error);
        renderError(error.message || "No se pudo confirmar el pago.");
      }
    }

    main();
  </script>
</body>
</html>
