<div style="font-family: Arial, sans-serif; color: #173f31; line-height: 1.6;">
  <h2 style="margin: 0 0 12px;">Recupera tu clave - {{brand_name}}</h2>
  <p>Hola {{cliente_nombre}},</p>
  <p>Recibimos una solicitud para restablecer tu clave de {{brand_name}}.</p>
  <p>
    <a
      href="{{reset_link}}"
      style="display:inline-block;background:#173f31;color:#fff8d8;text-decoration:none;padding:14px 22px;font-weight:bold;"
    >
      Restablecer clave
    </a>
  </p>
  <p>Si el botón no funciona, copia y pega este link en tu navegador:</p>
  <p>
    <a href="{{reset_link}}" style="color:#173f31;word-break:break-all;">{{reset_link}}</a>
  </p>
  <p>Si no pediste este cambio, puedes ignorar este correo.</p>
</div>
