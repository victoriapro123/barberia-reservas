<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar clave - Jardin Flor de Loto</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(0, 18, 17, 0.78), rgba(0, 14, 13, 0.84)),
        url("/assets/flor-de-loto-portada.png");
      background-size: cover;
      background-position: center;
      color: #173f31;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .panel {
      width: min(520px, 100%);
      background: #fffaf0;
      border: 1px solid rgba(255, 248, 216, 0.42);
      box-shadow: 0 30px 90px rgba(0, 12, 10, 0.36);
      display: grid;
      gap: 18px;
      padding: clamp(24px, 5vw, 40px);
    }
    h1 {
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      line-height: 0.95;
    }
    p { color: #607568; line-height: 1.6; }
    form { display: grid; gap: 12px; }
    input {
      width: 100%;
      min-height: 54px;
      border: 1px solid rgba(63, 110, 59, 0.2);
      background: #ffffff;
      color: #173f31;
      padding: 0 14px;
      font: inherit;
    }
    button, a {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }
    button {
      background: #173f31;
      color: #fff8d8;
    }
    a {
      background: #edf2e2;
      color: #173f31;
      border: 1px solid rgba(63, 110, 59, 0.14);
    }
    .status {
      min-height: 24px;
      color: #607568;
      font-weight: 800;
      line-height: 1.45;
    }
    .status.error { color: #a84141; }
    .status.ok { color: #2f7d4a; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Recuperar clave</h1>
    <p id="copy">Crea una nueva clave para tu cuenta de Jardin Flor de Loto.</p>
    <form id="resetForm">
      <input type="password" id="newPassword" placeholder="Nueva clave" minlength="6" autocomplete="new-password" required />
      <input type="password" id="confirmPassword" placeholder="Repetir nueva clave" minlength="6" autocomplete="new-password" required />
      <button type="submit">Guardar nueva clave</button>
      <div class="status" id="status"></div>
    </form>
    <a class="hidden" id="homeLink" href="https://jardinflordeloto.cl/">Volver a Jardin Flor de Loto</a>
  </main>

  <script type="module">
    const FIREBASE_API_KEY = "AIzaSyBc_r_3V9wmqWZpLeoBWZhRHJhy0F_zCIo";
    const HOME_URL = "https://jardinflordeloto.cl/";
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get("oobCode") || "";
    const resetForm = document.getElementById("resetForm");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const statusBox = document.getElementById("status");
    const homeLink = document.getElementById("homeLink");

    function setStatus(message, type = "") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    if (!oobCode) {
      setStatus("Este link no trae un codigo valido. Pide otro correo de recuperacion.", "error");
      resetForm.classList.add("hidden");
      homeLink.classList.remove("hidden");
    }

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = newPassword.value;
      const repeated = confirmPassword.value;

      if (password.length < 6) {
        setStatus("La clave debe tener al menos 6 caracteres.", "error");
        return;
      }

      if (password !== repeated) {
        setStatus("Las claves no coinciden.", "error");
        return;
      }

      setStatus("Guardando nueva clave...");

      try {
        const response = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:resetPassword?key=${FIREBASE_API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ oobCode, newPassword: password })
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload?.error?.message || "No se pudo cambiar la clave.");
        }

        setStatus("Clave actualizada correctamente. Te estamos llevando a Jardin Flor de Loto...", "ok");
        resetForm.classList.add("hidden");
        homeLink.classList.remove("hidden");
        window.setTimeout(() => {
          window.location.href = HOME_URL;
        }, 1800);
      } catch (error) {
        console.error(error);
        const message = String(error.message || "");
        const friendly = message.includes("EXPIRED_OOB_CODE")
          ? "El link vencio. Pide otro correo de recuperacion."
          : message.includes("INVALID_OOB_CODE")
            ? "El link ya fue usado o no es valido. Pide otro correo de recuperacion."
            : "No se pudo cambiar la clave. Pide otro correo de recuperacion.";
        setStatus(friendly, "error");
      }
    });
  </script>
</body>
</html>
